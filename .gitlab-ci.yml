stages:
  - update

update-readme:
  stage: update
  image: python:3.9-slim
  rules:
    # Runs on scheduled pipelines or manual triggers via the UI
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  before_script:
    - pip install feedparser
    - apt-get update && apt-get install -y git
  script:
    # 1. Run a python snippet to fetch feed and update README
    - |
      python3 -c "
      import feedparser
      import re

      feed_url = 'https://wyssmann.com/blog/index.xml'
      file_path = 'README.md'
      feed = feedparser.parse(feed_url)
      start_tag = '<!-- feed start -->'
      end_tag = '<!-- feed end -->'

      if not feed.entries:
          print('No entries found. Check RSS URL.')
          sys.exit(0)

      entries = [f'- [{e.title}]({e.link})' for e in feed.entries[:10]]
      new_content = '\n'.join(entries)

      with open(file_path, 'r') as f:
          original_readme = f.read()

      # Define the surgical pattern
      # \1 captures the start tag, \2 captures the end tag
      # .*? matches the old content inside without touching outside text
      pattern = re.escape(start_tag) + r'.*?' + re.escape(end_tag)
      replacement = f'\\1{start_tag}{new_content}{end_tag}\\2'

      # Perform replacement (re.DOTALL allows matching across multiple lines)
      updated_readme = re.sub(pattern, replacement, original_readme, flags=re.DOTALL)

      # Warn if no markers were found
      if updated_readme == original_readme and '<!-- feed start -->' not in original_readme:
          print('Warning: markers not found in README.md — nothing was replaced.')
          sys.exit(1)

      # 5. Save the result
      with open('README.md', 'w') as f:
          f.write(updated_readme)

      print('README.md updated successfully.')
      "
    # Push the changes back to the repo
    - git config --global user.email "ci@wyssmann.com"
    - git config --global user.name "CI Bot"
    - git add README.md
    - |
      if git commit -m "docs: update feed [skip ci]"; then
        # Use a Project Access Token for authentication
        git push "https://project_${CI_PROJECT_ID}_bot:${GL_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" HEAD:${CI_DEFAULT_BRANCH}
      else
        echo "No changes to commit"
      fi
